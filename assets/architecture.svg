<svg viewBox="0 0 720 680" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <rect width="720" height="680" fill="#ffffff"/>

  <!-- Layer labels -->
  <text x="28" y="96" font-size="13" fill="#666" font-weight="500">인프라</text>
  <line x1="28" y1="140" x2="28" y2="140" stroke="#ddd" stroke-width="1"/>

  <text x="28" y="226" font-size="13" fill="#666" font-weight="500">앱</text>

  <text x="28" y="356" font-size="13" fill="#666" font-weight="500">서버</text>

  <text x="28" y="476" font-size="13" fill="#666" font-weight="500">로직</text>

  <text x="28" y="596" font-size="13" fill="#666" font-weight="500">외부</text>

  <!-- Horizontal dividers -->
  <line x1="90" y1="155" x2="700" y2="155" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="90" y1="285" x2="700" y2="285" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="90" y1="415" x2="700" y2="415" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="90" y1="535" x2="700" y2="535" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── 인프라 Layer ── -->
  <!-- Windows 작업 스케줄러 -->
  <rect x="110" y="62" width="190" height="60" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="205" y="87" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Windows 작업 스케줄러</text>
  <text x="205" y="106" text-anchor="middle" font-size="11" fill="#6b7280">부팅 시 자동 실행</text>

  <!-- arrow -->
  <line x1="300" y1="92" x2="378" y2="92" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- watchdog.bat -->
  <rect x="380" y="62" width="190" height="60" rx="10" fill="#fff1ee" stroke="#f87171" stroke-width="1.5"/>
  <text x="475" y="87" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">kis_watchdog.py</text>
  <text x="475" y="106" text-anchor="middle" font-size="11" fill="#ef4444">Electron 감시 · 재시작</text>

  <!-- dashed line from watchdog down to Electron -->
  <line x1="475" y1="122" x2="475" y2="165" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="475" y1="165" x2="360" y2="195" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ── 앱 Layer ── -->
  <rect x="195" y="170" width="250" height="70" rx="12" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="320" y="198" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">Electron 앱 (main.js)</text>
  <text x="320" y="218" text-anchor="middle" font-size="11" fill="#7c3aed">트레이 아이콘 · WatchDog L2</text>

  <!-- arrow down -->
  <line x1="320" y1="240" x2="320" y2="295" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 서버 Layer ── -->
  <rect x="170" y="298" width="300" height="70" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="320" y="326" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Streamlit 서버 (app.py)</text>
  <text x="320" y="346" text-anchor="middle" font-size="11" fill="#1d4ed8">GUI · 파라미터 · 백테스팅 · 로그</text>

  <!-- arrows down to logic -->
  <line x1="220" y1="368" x2="180" y2="423" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="320" y1="368" x2="320" y2="423" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="368" x2="460" y2="423" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 로직 Layer ── -->
  <!-- scheduler.py -->
  <rect x="100" y="426" width="175" height="68" rx="10" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="188" y="452" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">scheduler.py</text>
  <text x="188" y="470" text-anchor="middle" font-size="11" fill="#047857">매매 루프 · 포지션 ×5</text>

  <!-- AI 점수 -->
  <rect x="292" y="426" width="160" height="68" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="372" y="452" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">AI 점수 (scorer)</text>
  <text x="372" y="470" text-anchor="middle" font-size="11" fill="#b45309">LLM · DART · 기술점수</text>

  <!-- backtest -->
  <rect x="470" y="426" width="145" height="68" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="543" y="452" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">backtest</text>
  <text x="543" y="470" text-anchor="middle" font-size="11" fill="#6b7280">일봉 · 분봉</text>

  <!-- arrows down to external -->
  <line x1="180" y1="494" x2="180" y2="548" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="320" y1="494" x2="370" y2="548" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="372" y1="494" x2="555" y2="548" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 외부 Layer ── -->
  <!-- KIS API -->
  <rect x="90" y="552" width="160" height="68" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="170" y="578" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">KIS API</text>
  <text x="170" y="597" text-anchor="middle" font-size="11" fill="#b91c1c">모의 · 실전</text>

  <!-- 텔레그램 -->
  <rect x="280" y="552" width="160" height="68" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="360" y="578" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">텔레그램</text>
  <text x="360" y="597" text-anchor="middle" font-size="11" fill="#b91c1c">선택봇 · 알람봇</text>

  <!-- Perplexity·DART -->
  <rect x="470" y="552" width="175" height="68" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="558" y="578" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Perplexity · DART</text>
  <text x="558" y="597" text-anchor="middle" font-size="11" fill="#b91c1c">뉴스 · 공시 분석</text>
</svg>

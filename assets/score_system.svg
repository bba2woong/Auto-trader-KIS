<svg viewBox="0 0 780 660" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <rect width="780" height="660" fill="#ffffff"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" font-size="17" font-weight="600" fill="#1f2937">종목 점수 산출 구조 (최대 110점)</text>

  <!-- ── 기술적 분석 box ── -->
  <rect x="30" y="56" width="320" height="300" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.8"/>
  <text x="190" y="86" text-anchor="middle" font-size="14" fill="#374151">기술적 분석</text>

  <!-- 변동성 돌파 -->
  <rect x="52" y="98" width="276" height="72" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="190" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">변동성 돌파</text>
  <text x="190" y="142" text-anchor="middle" font-size="11" fill="#3b82f6">시가 + 전일변동폭 × K → 최대 40점</text>

  <!-- AD Line -->
  <rect x="52" y="182" width="276" height="72" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="190" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">AD Line</text>
  <text x="190" y="226" text-anchor="middle" font-size="11" fill="#3b82f6">최근 5일 누적 거래량 추세 → 15점</text>

  <!-- 캔들 패턴 -->
  <rect x="52" y="266" width="276" height="72" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="190" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">캔들 패턴</text>
  <text x="190" y="310" text-anchor="middle" font-size="11" fill="#3b82f6">해머 +10 / 60분 강세봉 +15</text>

  <!-- ── AI 분석 box ── -->
  <rect x="370" y="56" width="300" height="220" rx="14" fill="#fef9ee" stroke="#fde68a" stroke-width="1.8"/>
  <text x="520" y="86" text-anchor="middle" font-size="14" fill="#374151">AI 분석</text>

  <!-- Perplexity LLM -->
  <rect x="392" y="98" width="256" height="72" rx="10" fill="#ffffff" stroke="#fde68a" stroke-width="1.2"/>
  <text x="520" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Perplexity LLM</text>
  <text x="520" y="142" text-anchor="middle" font-size="11" fill="#b45309">최근 3일 뉴스 분석 → 최대 10점</text>

  <!-- DART 공시 -->
  <rect x="392" y="182" width="256" height="72" rx="10" fill="#ffffff" stroke="#fde68a" stroke-width="1.2"/>
  <text x="520" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">DART 공시</text>
  <text x="520" y="226" text-anchor="middle" font-size="11" fill="#b45309">수주/계약 +10 / 횡령/손실 -10</text>

  <!-- ── 관심종목 box ── -->
  <rect x="370" y="292" width="300" height="72" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="1.8"/>
  <text x="520" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">관심종목 (watchlist)</text>
  <text x="520" y="342" text-anchor="middle" font-size="11" fill="#15803d">등록 종목 가점 → +10점</text>

  <!-- arrows down to 총점 -->
  <line x1="190" y1="356" x2="190" y2="406" stroke="#888" stroke-width="1.5"/>
  <line x1="190" y1="406" x2="340" y2="440" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="520" y1="364" x2="520" y2="406" stroke="#888" stroke-width="1.5"/>
  <line x1="520" y1="406" x2="400" y2="440" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 총점 합산 ── -->
  <rect x="220" y="442" width="340" height="68" rx="14" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.8"/>
  <text x="390" y="468" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">총점 합산 (최대 110점)</text>
  <text x="390" y="490" text-anchor="middle" font-size="11" fill="#6d28d9">기술(70) + LLM(10) + DART(10) + WL(10)</text>

  <!-- three branches -->
  <line x1="310" y1="510" x2="170" y2="560" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="390" y1="510" x2="390" y2="560" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="470" y1="510" x2="610" y2="560" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 자동 매수 -->
  <rect x="70" y="562" width="200" height="68" rx="10" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="170" y="590" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">자동 매수</text>
  <text x="170" y="610" text-anchor="middle" font-size="12" fill="#047857">90점 이상</text>

  <!-- 텔레그램 확인 -->
  <rect x="290" y="562" width="200" height="68" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="390" y="590" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">텔레그램 확인</text>
  <text x="390" y="610" text-anchor="middle" font-size="12" fill="#b91c1c">60~89점</text>

  <!-- 스킵 -->
  <rect x="510" y="562" width="200" height="68" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="610" y="590" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">스킵</text>
  <text x="610" y="610" text-anchor="middle" font-size="12" fill="#6b7280">60점 미만</text>
</svg>

<svg viewBox="0 0 620 820" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#888"/>
    </marker>
    <marker id="arr-w" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <rect width="620" height="820" fill="#ffffff"/>

  <!-- ── START ── -->
  <rect x="185" y="24" width="250" height="52" rx="26" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="310" y="55" text-anchor="middle" font-size="15" font-weight="600" fill="#374151">09:00 장 시작</text>

  <line x1="310" y1="76" x2="310" y2="104" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 스크리닝 ── -->
  <rect x="155" y="106" width="310" height="68" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="310" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">스크리닝 (10분 주기)</text>
  <text x="310" y="152" text-anchor="middle" font-size="11" fill="#1d4ed8">KOSPI200 · KOSDAQ · 관심종목</text>

  <line x1="310" y1="174" x2="310" y2="202" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── AI 점수 산출 ── -->
  <rect x="130" y="204" width="360" height="68" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="310" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">AI 점수 산출</text>
  <text x="310" y="252" text-anchor="middle" font-size="11" fill="#b45309">기술(55) + LLM(10) + DART(10) + 강세봉(15) + WL(5)</text>

  <line x1="310" y1="272" x2="310" y2="300" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 점수 기준 라우팅 ── -->
  <rect x="175" y="302" width="270" height="52" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="310" y="333" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">점수 기준 라우팅</text>

  <!-- three branches -->
  <!-- left: 90점+ -->
  <line x1="240" y1="354" x2="140" y2="394" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="173" y="388" text-anchor="middle" font-size="10" fill="#666">90점+</text>

  <!-- center: 60~89점 -->
  <line x1="310" y1="354" x2="310" y2="394" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="338" y="380" font-size="10" fill="#666">60~89점</text>

  <!-- right: 60점 미만 -->
  <line x1="380" y1="354" x2="480" y2="394" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="437" y="388" text-anchor="middle" font-size="10" fill="#666">60점 미만</text>

  <!-- 자동 매수 -->
  <rect x="60" y="396" width="160" height="68" rx="10" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="140" y="420" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">🤖 자동 매수</text>
  <text x="140" y="440" text-anchor="middle" font-size="11" fill="#047857">즉시 진입</text>

  <!-- 텔레그램 확인 -->
  <rect x="225" y="396" width="170" height="68" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="310" y="420" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">📱 텔레그램 확인</text>
  <text x="310" y="440" text-anchor="middle" font-size="11" fill="#b91c1c">5분 대기 후 자동 패스</text>

  <!-- 스킵 -->
  <rect x="400" y="396" width="160" height="68" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="480" y="420" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">⏭ 스킵</text>
  <text x="480" y="440" text-anchor="middle" font-size="11" fill="#6b7280">다음 스크리닝 대기</text>

  <!-- merge lines to 매수 체결 -->
  <line x1="140" y1="464" x2="140" y2="510" stroke="#888" stroke-width="1.2"/>
  <line x1="140" y1="510" x2="270" y2="510" stroke="#888" stroke-width="1.2"/>
  <line x1="310" y1="464" x2="310" y2="510" stroke="#888" stroke-width="1.2"/>
  <line x1="270" y1="510" x2="310" y2="510" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <line x1="310" y1="510" x2="310" y2="530" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 매수 체결 ── -->
  <rect x="150" y="532" width="320" height="68" rx="12" fill="#ccfbf1" stroke="#5eead4" stroke-width="1.5"/>
  <text x="310" y="558" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">매수 체결 (시장가)</text>
  <text x="310" y="578" text-anchor="middle" font-size="11" fill="#0d9488">포지션 스레드 시작 · 알람봇 알림</text>

  <line x1="310" y1="600" x2="310" y2="628" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 청산 조건 모니터링 ── -->
  <rect x="160" y="630" width="300" height="56" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="310" y="662" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">청산 조건 모니터링 (20초)</text>

  <!-- three outcome branches -->
  <line x1="230" y1="686" x2="140" y2="726" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="310" y1="686" x2="310" y2="726" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="390" y1="686" x2="480" y2="726" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 하드 손절 -->
  <rect x="50" y="728" width="180" height="68" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="140" y="752" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">▼ 하드 손절</text>
  <text x="140" y="772" text-anchor="middle" font-size="11" fill="#b91c1c">-2.3% 즉시 매도</text>

  <!-- 트레일링 스탑 -->
  <rect x="220" y="728" width="180" height="68" rx="10" fill="#ccfbf1" stroke="#5eead4" stroke-width="1.5"/>
  <text x="310" y="752" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">📉 트레일링 스탑</text>
  <text x="310" y="772" text-anchor="middle" font-size="11" fill="#0d9488">고점 대비 -3%</text>

  <!-- 강제 청산 -->
  <rect x="390" y="728" width="180" height="68" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="480" y="752" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">⏰ 강제 청산</text>
  <text x="480" y="772" text-anchor="middle" font-size="11" fill="#6b7280">15:00 장 마감</text>
</svg>
